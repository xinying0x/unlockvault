<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lockGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="keyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EF4444;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="32" cy="32" r="30" fill="url(#lockGradient)" opacity="0.1" stroke="url(#lockGradient)" stroke-width="2">
    <animate attributeName="r" values="28;32;28" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.1;0.3;0.1" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Lock Body -->
  <rect x="20" y="28" width="24" height="20" rx="4" ry="4" fill="url(#lockGradient)" filter="url(#glow)">
    <animate attributeName="fill-opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Lock Shackle -->
  <path d="M 26 28 Q 26 20 32 20 Q 38 20 38 28" stroke="url(#lockGradient)" stroke-width="3" fill="none" filter="url(#glow)">
    <animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </path>
  
  <!-- Keyhole -->
  <circle cx="32" cy="36" r="3" fill="#1F2937">
    <animate attributeName="r" values="2;4;2" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <rect x="31" y="36" width="2" height="6" fill="#1F2937">
    <animate attributeName="height" values="4;8;4" dur="1.5s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Key (appears on hover/animation) -->
  <g transform="translate(45, 15)" opacity="0">
    <animateTransform attributeName="transform" type="translate" values="45,15;35,25;45,15" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite"/>
    
    <!-- Key shaft -->
    <rect x="0" y="8" width="12" height="2" fill="url(#keyGradient)" rx="1"/>
    
    <!-- Key head -->
    <circle cx="0" cy="9" r="4" fill="url(#keyGradient)"/>
    <circle cx="0" cy="9" r="2" fill="none" stroke="#1F2937" stroke-width="1"/>
    
    <!-- Key teeth -->
    <rect x="10" y="6" width="2" height="2" fill="url(#keyGradient)"/>
    <rect x="8" y="10" width="2" height="2" fill="url(#keyGradient)"/>
  </g>
  
  <!-- Sparkle effects -->
  <g opacity="0.7">
    <circle cx="15" cy="15" r="1" fill="#F59E0B">
      <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" begin="0s"/>
    </circle>
    <circle cx="50" cy="20" r="1" fill="#EF4444">
      <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle cx="48" cy="48" r="1" fill="#8B5CF6">
      <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <circle cx="16" cy="50" r="1" fill="#3B82F6">
      <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" begin="1.5s"/>
    </circle>
  </g>
  
  <!-- Text (for larger versions) -->
  <text x="32" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" font-weight="bold" fill="url(#lockGradient)" opacity="0.8">
    UNLOCK
  </text>
</svg> 