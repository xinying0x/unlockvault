image: node:18

definitions:
  services:
    docker:
      memory: 2048

pipelines:
  default:
    - step:
        name: Build and Test
        caches:
          - node
        script:
          - npm ci
          - npm run build
          - npm run lint --if-present
        artifacts:
          - .next/**
          - public/**
          - package*.json
          - next.config.js
          - vercel.json

  branches:
    main:
      - step:
          name: Build Production
          caches:
            - node
          script:
            - npm ci
            - npm run build
          artifacts:
            - .next/**
            - public/**
            - package*.json
            - next.config.js
            - vercel.json
      - step:
          name: Deploy to Production
          deployment: production
          script:
            - echo "Deploying to production..."
            # Add your deployment commands here
            # For example, if using Vercel:
            # - npm install -g vercel
            # - vercel --token $VERCEL_TOKEN --prod --yes
            # 
            # For VPS deployment:
            # - rsync -avz --delete ./ user@server:/var/www/unlockvault/
            # - ssh user@server "cd /var/www/unlockvault && npm install --production && pm2 restart unlockvault"
            #
            # For Netlify:
            # - npm install -g netlify-cli
            # - netlify deploy --prod --dir=.next --auth $NETLIFY_AUTH_TOKEN --site $NETLIFY_SITE_ID

  pull-requests:
    '**':
      - step:
          name: Build and Test PR
          caches:
            - node
          script:
            - npm ci
            - npm run build
            - npm run lint --if-present 